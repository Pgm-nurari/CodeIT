<!DOCTYPE html>
<html>
<head>
    <title>Online Quiz System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f5f5
        }
        .section-box {
            background: white;
            padding: 18px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08)
        }
        h5 {
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 2px solid #f1f1f1;
            padding-bottom: 6px;
            margin-bottom: 15px
        }
        table {
            font-size: 14px;
            background: white
        }
        .table thead {
            background: #343a40;
            color: white
        }
        .selected-row {
            background-color: #d1ecf1 !important
        }
        .btn {
            border-radius: 6px
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 4px rgba(13, 110, 253, .25)
        }
        .empty-msg {
            color: #888;
            font-style: italic
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold">📘 Online Quiz System</h2>
            <small class="text-muted">Quiz & Question Management</small>
        </div>
        <div class="row g-4">
            <div class="col-md-5">
                <div class="section-box">
                    <h5 class="text-primary">Quiz Management</h5>
                    <input type="text" id="quizTitle" class="form-control mb-2" placeholder="Quiz Title">
                    <input type="text" id="quizSubject" class="form-control mb-2" placeholder="Subject">
                    <button class="btn btn-sm btn-primary" onclick="addOrUpdateQuiz()">Save Quiz</button>
                </div>
                <div class="section-box">
                    <h5 class="text-success">Available Quizzes</h5>
                    <input type="text" id="quizSearch" class="form-control mb-2" placeholder="Search Quiz..."
                        onkeyup="searchQuiz()">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Subject</th>
                                <th>Select</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                        </thead>
                        <tbody id="quizTable"></tbody>
                    </table>
                </div>
            </div>
            <div class="col-md-7">
                <div class="section-box">
                    <h5 id="selectedQuizText">No Quiz Selected</h5>
                    <div id="questionFormDiv" style="display:none;">
                        <select id="questionType" class="form-control mb-2" onchange="changeType()">
                            <option value="">Select Type</option>
                            <option>MCQ</option>
                            <option>True/False</option>
                            <option>Descriptive</option>
                        </select>
                        <textarea id="questionText" class="form-control mb-2" placeholder="Question"></textarea>
                        <div id="mcqOptions" style="display:none;">
                            <input class="form-control mb-1" id="optA" placeholder="Option A">
                            <input class="form-control mb-1" id="optB" placeholder="Option B">
                            <input class="form-control mb-1" id="optC" placeholder="Option C">
                            <input class="form-control mb-1" id="optD" placeholder="Option D">
                        </div>
                        <input id="answer" class="form-control mb-2" placeholder="Answer">
                        <button class="btn btn-sm btn-success" onclick="addOrUpdateQuestion()">Save Question</button>
                        <hr>
                    </div>
                    <div class="row mb-2">
                        <div class="col-md-6">
                            <input type="text" id="questionSearch" class="form-control" placeholder="Search Question..."
                                onkeyup="filterQuestions()">
                        </div>
                        <div class="col-md-6">
                            <select id="typeFilter" class="form-control" onchange="filterQuestions()">
                                <option value="">All Types</option>
                                <option>MCQ</option>
                                <option>True/False</option>
                                <option>Descriptive</option>
                            </select>
                        </div>
                    </div>
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Question</th>
                                <th>Type</th>
                                <th>Answer</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                        </thead>
                        <tbody id="questionTable">
                            <tr>
                                <td colspan="5" class="text-center"><span class="empty-msg">No Quiz Selected</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script>
        let quizzes = JSON.parse(localStorage.getItem("quizzes")) || [];
        let selectedQuizId = null;
        let editQuizId = null;
        let editQuestionId = null;
        function saveData() {
            localStorage.setItem("quizzes", JSON.stringify(quizzes));
        }
        function addOrUpdateQuiz() {
            let title = document.getElementById("quizTitle").value.trim();
            let subject = document.getElementById("quizSubject").value.trim();
            if (title === "" || subject === "") {
                alert("Fill all fields");
                return;
            }
            if (editQuizId === null) {
                quizzes.push({
                    id: Date.now(),
                    title,
                    subject,
                    questions: []
                });
            } else {
                let q = quizzes.find(x => x.id === editQuizId);
                q.title = title;
                q.subject = subject;
                editQuizId = null;
            }
            saveData();
            displayQuizTable();
            document.getElementById("quizTitle").value = "";
            document.getElementById("quizSubject").value = "";
        }
        function displayQuizTable() {
            let html = "";
            quizzes.forEach(q => {
                html += `<tr class="${selectedQuizId === q.id ? 'selected-row' : ''}">
                    <td>${q.title}</td>
                    <td>${q.subject}</td>
                    <td><button class="btn btn-sm btn-outline-primary" onclick="selectQuiz(${q.id})">Select</button></td>
                    <td><button class="btn btn-sm btn-outline-secondary" onclick="editQuiz(${q.id})">Edit</button></td>
                    <td><button class="btn btn-sm btn-outline-danger" onclick="deleteQuiz(${q.id})">Delete</button></td>
                </tr>`;
            });
            document.getElementById("quizTable").innerHTML = html;
        }
        function displayFilteredQuiz(list) {
            let html = "";
            list.forEach(q => {
                html += `
<tr class="${selectedQuizId === q.id ? 'selected-row' : ''}">
<td>${q.title}</td>
<td>${q.subject}</td>
<td><button class="btn btn-sm btn-outline-primary"
onclick="selectQuiz(${q.id})">Select</button></td>
<td><button class="btn btn-sm btn-outline-secondary"
onclick="editQuiz(${q.id})">Edit</button></td>
<td><button class="btn btn-sm btn-outline-danger"
onclick="deleteQuiz(${q.id})">Delete</button></td>
</tr>`;
            });
            document.getElementById("quizTable").innerHTML = html;
        }
        function searchQuiz() {
            let key = document.getElementById("quizSearch")
                .value.toLowerCase();
            let filtered = quizzes.filter(q =>
                q.title.toLowerCase().includes(key) ||
                q.subject.toLowerCase().includes(key)
            );
            displayFilteredQuiz(filtered);
        }
        function filterQuestions() {
            if (selectedQuizId === null) return;
            let quiz = quizzes.find(q => q.id === selectedQuizId);
            let text = document.getElementById("questionSearch")
                .value.toLowerCase();
            let type = document.getElementById("typeFilter").value;
            let filtered = quiz.questions.filter(q => {
                let matchText =
                    q.question.toLowerCase().includes(text);
                let matchType =
                    (type === "" || q.type === type);
                return matchText && matchType;
            });
            displayFilteredQuestions(filtered);
        }
        function editQuiz(id) {
            let q = quizzes.find(x => x.id === id);
            document.getElementById("quizTitle").value = q.title;
            document.getElementById("quizSubject").value = q.subject;
            editQuizId = id;
        }
        function deleteQuiz(id) {
            if (!confirm("Delete quiz?"))
                return;
            quizzes = quizzes.filter(q => q.id !== id);
            saveData();
            displayQuizTable();
            resetQuestions();
        }
        function selectQuiz(id) {
            selectedQuizId = id;
            let quiz = quizzes.find(q => q.id === id);
            document.getElementById("selectedQuizText").innerText = "Questions of: " + quiz.title + " (" + quiz.questions.length + " questions)";
            document.getElementById("questionFormDiv").style.display = "block";
            displayQuestions();
        }
        function changeType() {
            let type = document.getElementById("questionType").value;
            document.getElementById("mcqOptions").style.display = (type === "MCQ") ? "block" : "none";
        }
        function addOrUpdateQuestion() {
            if (selectedQuizId === null) {
                alert("Select quiz first");
                return;
            }
            let type = document.getElementById("questionType").value;
            let question = document.getElementById("questionText").value.trim();
            let answer = document.getElementById("answer").value.trim();
            if (type === "" || question === "" || answer === "") {
                alert("Fill all fields");
                return;
            }
            let quiz = quizzes.find(q => q.id === selectedQuizId);
            let options = [];
            if (type === "MCQ") {
                options = [
                    document.getElementById("optA").value,
                    document.getElementById("optB").value,
                    document.getElementById("optC").value,
                    document.getElementById("optD").value
                ];
            }
            if (editQuestionId === null) {
                quiz.questions.push({
                    qid: Date.now(),
                    question,
                    type,
                    options,
                    answer
                });
            } else {
                let ques = quiz.questions.find(x => x.qid === editQuestionId);
                ques.question = question;
                ques.type = type;
                ques.options = options;
                ques.answer = answer;
                editQuestionId = null;
            }
            document.getElementById("questionText").focus();
            saveData();
            displayQuestions();
            clearQuestionForm();
        }
        function displayQuestions() {
            let quiz = quizzes.find(q => q.id === selectedQuizId);
            if (!quiz)
                return;
            document.getElementById("selectedQuizText").innerText = "Questions of: " + quiz.title + " (" + quiz.questions.length + " questions)";
            let html = "";
            if (!quiz || quiz.questions.length === 0) {
                html = `<tr>
                    <td colspan="5" class="text-center">
                        <span class="empty-msg">No Questions</span>
                    </td>
                </tr>`;
            } else {
                quiz.questions.forEach(q => {
                    html += `<tr>
                        <td>${q.question}</td>
                        <td>${q.type}</td>
                        <td>${q.answer}</td>
                        <td><button class="btn btn-sm btn-warning" onclick="editQuestion(${q.qid})">Edit</button></td>
                        <td><button class="btn btn-sm btn-danger" onclick="deleteQuestion(${q.qid})">Delete</button></td>
                    </tr>`;
                });
            }
            document.getElementById("questionTable").innerHTML = html;
        }
        function displayFilteredQuestions(list) {
            let html = "";
            if (list.length === 0) {
                html = `<tr>
<td colspan="5" class="text-center">
<span class="empty-msg">No Matching Questions</span>
</td></tr>`;
            }
            else {
                list.forEach(q => {
                    html += `
<tr>
<td>${q.question}</td>
<td>${q.type}</td>
<td>${q.answer}</td>
<td><button class="btn btn-sm btn-outline-secondary"
onclick="editQuestion(${q.qid})">Edit</button></td>
<td><button class="btn btn-sm btn-outline-danger"
onclick="deleteQuestion(${q.qid})">Delete</button></td>
</tr>`;
                });
            }
            document.getElementById("questionTable").innerHTML = html;
        }
        function editQuestion(id) {
            let quiz = quizzes.find(q => q.id === selectedQuizId);
            let ques = quiz.questions.find(x => x.qid === id);
            document.getElementById("questionText").value = ques.question;
            document.getElementById("questionType").value = ques.type;
            document.getElementById("answer").value = ques.answer;
            changeType();
            if (ques.type === "MCQ") {
                document.getElementById("optA").value = ques.options[0];
                document.getElementById("optB").value = ques.options[1];
                document.getElementById("optC").value = ques.options[2];
                document.getElementById("optD").value = ques.options[3];
            }
            editQuestionId = id;
        }
        function deleteQuestion(id) {
            if (!confirm("Delete question?"))
                return;
            let quiz = quizzes.find(q => q.id === selectedQuizId);
            quiz.questions = quiz.questions.filter(q => q.qid !== id);
            saveData();
            displayQuestions();
        }
        function clearQuestionForm() {
            document.getElementById("questionText").value = "";
            document.getElementById("questionType").value = "";
            document.getElementById("answer").value = "";
            document.getElementById("mcqOptions").style.display = "none";
            document.getElementById("questionText").focus();
        }
        function resetQuestions() {
            selectedQuizId = null;
            document.getElementById("questionFormDiv").style.display = "none";
            document.getElementById("selectedQuizText").innerText = "No Quiz Selected";
            document.getElementById("questionTable").innerHTML = `<tr>
                <td colspan="5" class="text-center">
                    <span class="empty-msg">No Quiz Selected</span>
                </td>
            </tr>`;
        }
        displayQuizTable();
    </script>
</body>
</html>
